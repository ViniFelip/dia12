<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nossa Galeria ❤️</title>

  <style>
    body{
      margin:0;
      padding:20px;
      font-family:'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    h1{
      text-align:center;
      color:white;
      margin-bottom:30px;
    }

    .galeria{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap:20px;
    }

    .galeria img{
      width:100%;
      height:320px;
      object-fit:cover;
      border-radius:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
      transition:0.3s;
    }

    .galeria img:hover{
      transform:scale(1.03);
    }

    .voltar{
      display:block;
      width:max-content;
      margin:30px auto;
      padding:12px 20px;
      background:white;
      color:#e63946;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <h1>Nossa Galeria ❤️</h1>

  <div class="galeria">
    <img src="/WhatsApp Image 2026-05-01 at 18.51.45.jpeg">
    <img src="/WhatsApp Image 2026-05-01 at 18.51.46.jpeg">
    <img src="/WhatsApp Image 2026-05-02 at 10.18.15.jpeg">
    <img src="/lori.jpeg">

    <!-- adicione mais fotos aqui -->

    <img src="/nos/lv1.jpg" alt="">
    <img src="/nos/lv2.jpg" alt="">
    <img src="/nos/lv3.jpg" alt="">
    <img src="/nos/lv4.jpg" alt="">
    <img src="/nos/lv5.jpg">
    <img src="/nos/lv6.jpg" alt="">
    <img src="/nos/lv7.jpg" alt="">
    <img src="/nos/lv8.jpg" alt="">
    <img src="/nos/1781262831822 (1).jpg" alt="">
    <img src="/nos/1781262831822 (1).jpg" alt="">
  </div>

  <a href="index.html" class="voltar">⬅ Voltar</a>

</body>
</html>
